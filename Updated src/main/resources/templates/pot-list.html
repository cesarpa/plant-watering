<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pot List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.7/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="fas fa-leaf text-success me-2"></i>ALEYNA GARDEN
        </a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="/"><i class="fas fa-home me-1"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/plants"><i class="fas fa-seedling me-1"></i> Plants</a></li>
            </ul>
        </div>
    </div>
</nav>

<header class="hero-section shadow-sm">
    <div class="container">
        <h1 class="hero-title">Pot List</h1>
        <p class="opacity-75 fw-light">Manage your pots here.</p>
    </div>
</header>

<div class="container mt-4">
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">

        <div class="col">
            <div class="card h-100 nav-card text-center p-4 border-bottom border-success border-4">
                <div class="card-body d-flex flex-column align-items-center">
                    <div class="card-icon"><i class="fas fa-jar"></i></div>
                    <h5 class="fw-bold">Pots</h5>
                    <p class="text-muted small">Container styles.</p>
                    <a href="/pots/new" class="btn btn-garden mt-auto w-100">Add New Pot</a>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="container">
    <h2>Pot List</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Material</th>
                <th>Size</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="pot : ${pots}">
                <td th:text="${pot.id}"></td>
                <td th:text="${pot.name}"></td>
                <td th:text="${pot.material}"></td>
                <td th:text="${pot.size}"></td>
                <td>
                    <a href="/pots/{id}/edit" th:href="@{/pots/{id}(id=${pot.id})}" class="btn btn-warning">Edit</a>
                    <form action="/pots/{id}/delete" th:action="@{/pots/{id}(id=${pot.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
    <div th:if="${message}">
        <div class="alert alert-success mt-3" role="alert">
            <span th:text="${message}"></span>
        </div>
    </div>
</div>

<footer>
    <div class="mb-3">
        <span class="badge bg-success">System Active</span>
        <span class="badge bg-dark ms-2">Java 21</span>
    </div>
    <p>&copy; 2026 Aleyna Garden | Spring Boot 3 & Jakarta EE</p>
</footer>

</body>
</html>
