<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Menu</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .banner {
            background-image: url('https://source.unsplash.com/random/1920x1080');
            background-size: cover;
            background-position: center;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="banner">
        <h1>Plant & Garden Management System</h1>
    </div>
    <div class="container mt-4">
        <div class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col">
                <div class="card shadow-lg h-100">
                    <div class="card-body d-flex flex-column align-items-center justify-content-center">
                        <i class="fas fa-pottery fa-2x mb-2"></i>
                        <h5 class="card-title">Pots</h5>
                        <a href="/pots" class="btn btn-primary">Manage Pots</a>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card shadow-lg h-100">
                    <div class="card-body d-flex flex-column align-items-center justify-content-center">
                        <i class="fas fa-sun fa-2x mb-2"></i>
                        <h5 class="card-title">Energy Sources</h5>
                        <a href="/energy-sources" class="btn btn-primary">Manage Energy Sources</a>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card shadow-lg h-100">
                    <div class="card-body d-flex flex-column align-items-center justify-content-center">
                        <i class="fas fa-seedling fa-2x mb-2"></i>
                        <h5 class="card-title">Fertilizers</h5>
                        <a href="/fertilizers" class="btn btn-primary">Manage Fertilizers</a>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card shadow-lg h-100">
                    <div class="card-body d-flex flex-column align-items-center justify-content-center">
                        <i class="fas fa-tree fa-2x mb-2"></i>
                        <h5 class="card-title">Plants</h5>
                        <a href="/plants" class="btn btn-primary">Manage Plants</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
